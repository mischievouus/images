<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>invis.me | spiritual dhikr</title>

  <style>
    :root {
      --bg: #0f1115;
      --card: #171a21;
      --text: #e6e9ef;
      --muted: #9aa3b2;
      --accent: #7dd3fc;
      --radius: 16px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      padding: 2rem;
    }

    header {
      max-width: 1200px;
      margin: 0 auto 2rem;
      text-align: center;
    }

    h1 {
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    p {
      color: var(--muted);
      margin-top: 0.5rem;
    }

    /* Main gallery container fills remaining space and centers content vertically if short */
    main.gallery {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.5rem;
      max-width: 1200px;
      margin: 0 auto;
      align-content: center; /* vertical centering for few images */
    }

    /* Cards */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      overflow: hidden;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    .card img {
      width: 100%;
      height: auto;
      display: block;
    }

    .card-content {
      padding: 1rem;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 500;
    }

    .card-link {
      display: inline-block;
      margin-top: 0.5rem;
      font-size: 0.85rem;
      color: var(--accent);
      text-decoration: none;
    }

    .card-link:hover {
      text-decoration: underline;
    }

    footer {
      text-align: center;
      margin-top: 2rem;
      color: var(--muted);
      font-size: 0.85rem;
    }
  </style>
</head>

<body>

  <header>
    <h1>SPIRTUAL DHIKR</h1>
    <p>Fragments of reflection — fleeting, like bubbles on water.</p>
  </header>

  <main class="gallery">
    <!-- GALLERY:START -->
    <!-- GALLERY:END -->
  </main>

  <footer>
    © invis.me | spirtual dhikr
  </footer>

</body>
</html>
