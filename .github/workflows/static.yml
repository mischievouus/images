name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      # Checkout repo
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false  # ensures we don’t rely on default creds

      # Setup GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Ensure CNAME exists
      - name: Create CNAME for custom domain
        run: echo "images.invis.me" > CNAME

      # Generate gallery inside the artifact (no push)
      - name: Generate gallery HTML
        run: |
          echo "Generating gallery..."
          ITEMS=""
          for file in poems/*.{jpg,jpeg,png,webp}; do
            [ -e "$file" ] || continue
            name=$(basename "$file")
            title=$(basename "$file" | sed 's/\.[^.]*$//' | sed 's/-/ /g')
            ITEMS="$ITEMS
            <article class=\"card\">
              <img src=\"$name\" alt=\"$title poem\" loading=\"lazy\" />
              <div class=\"card-content\">
                <div class=\"card-title\">$title</div>
                <a class=\"card-link\" href=\"$name\" target=\"_blank\">View full</a>
              </div>
            </article>"
          done

          awk -v items="$ITEMS" '
            /<!-- GALLERY:START -->/ { print; print items; next }
            /<!-- GALLERY:END -->/ { print; next }
            { print }
          ' poems/index.html > poems/index.tmp.html
          mv poems/index.tmp.html poems/index.html

      # Upload artifact for GitHub Pages
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
          name: pages-artifact

      # Deploy artifact to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: pages-artifact