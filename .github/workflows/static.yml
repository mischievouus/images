name: Build and Deploy Gallery

on:
  push:
    branches: ["main"]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate gallery HTML
        run: |
          echo "Generating gallery..."

          ITEMS=""

          for file in poems/*.{jpg,jpeg,png,webp}; do
            [ -e "$file" ] || continue

            name=$(basename "$file")
            title=$(basename "$file" | sed 's/\.[^.]*$//' | sed 's/-/ /g')

            ITEMS="$ITEMS
            <article class=\"card\">
              <img src=\"$name\" alt=\"$title poem\" loading=\"lazy\" />
              <div class=\"card-content\">
                <div class=\"card-title\">$title</div>
                <a class=\"card-link\" href=\"$name\" target=\"_blank\">View full</a>
              </div>
            </article>"
          done

          awk -v items="$ITEMS" '
            /<!-- GALLERY:START -->/ { print; print items; next }
            /<!-- GALLERY:END -->/ { print; next }
            { print }
          ' poems/index.html > poems/index.tmp.html

          mv poems/index.tmp.html poems/index.html

      - name: Commit updated gallery
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add poems/index.html
          git commit -m "Auto-update gallery" || echo "No changes"
          git push

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Create CNAME
        run: echo "images.invis.me" > CNAME

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
          name: pages-artifact

      - name: Deploy
        uses: actions/deploy-pages@v4
        with:
          artifact_name: pages-artifact
